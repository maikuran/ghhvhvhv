<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Creator Dimensions</title>

<script src="https://cdn.jsdelivr.net/npm/decimal.js@10.4.3/decimal.min.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:20px;
}

.panel{
    border:1px solid #444;
    padding:10px;
    margin-bottom:10px;
}

.creator{
    border:1px solid #333;
    padding:8px;
    margin:5px 0;
}

button{
    background:#222;
    color:white;
    border:1px solid #666;
    padding:5px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

h1,h2{
    margin:5px 0;
}
</style>
</head>
<body>

<h1>Creator Dimensions</h1>

<div class="panel">
    <h2>Matter</h2>
    <div id="matter"></div>
    <div id="inDisplay"></div>
</div>

<div class="panel">
    <h2>Infinity Energy</h2>
    <div id="ieDisplay"></div>

    <button onclick="buyUpgrade(0)">Infinity Upgrade 1 (Cost: 1 IE)</button>
    <button onclick="buyUpgrade(1)">Infinity Upgrade 2 (Cost: 5 IE)</button>
    <button onclick="buyUpgrade(2)">Infinity Upgrade 3 (Cost: 20 IE)</button>
    <button onclick="buyUpgrade(3)">Infinity Upgrade 4 (Cost: 100 IE)</button>
</div>

<div class="panel">
    <h2>Creators</h2>
    <div id="creators"></div>
</div>

<div class="panel">
    <h2>Generators</h2>
    <div id="generators"></div>
</div>

<script>

const CREATOR_COUNT = 15;
const GENERATOR_COUNT = 10;

const creators = [];
const generators = [];

let matter = new Decimal(10);
let infinityEnergy = new Decimal(0);

const upgrades = [false,false,false,false];

const upgradeCosts = [
    new Decimal(1),
    new Decimal(5),
    new Decimal(20),
    new Decimal(100)
];

const IN_BASE = new Decimal("1e308");

for(let i=0;i<CREATOR_COUNT;i++){

    let cost;

    if(i === CREATOR_COUNT - 1){
        cost = new Decimal("1e100");
    }else{
        cost = Decimal.pow(10,i+1);
    }

    creators.push({
        amount:new Decimal(0),
        bought:new Decimal(0),
        cost:cost
    });
}

for(let i=0;i<GENERATOR_COUNT;i++){

    let cost;

    if(i === GENERATOR_COUNT - 1){
        cost = new Decimal("1e40");
    }else{
        cost = Decimal.pow(10,i+1);
    }

    generators.push({
        amount:new Decimal(0),
        bought:new Decimal(0),
        cost:cost
    });
}

function format(x){

    x = new Decimal(x);

    if(x.eq(0)) return "0";
    if(x.lt(IN_BASE)) return x.toExponential(3);

    return x.div(IN_BASE).toExponential(3)+" In";
}

function getInAmount(){
    return matter.div(IN_BASE);
}

function gainInfinityEnergy(){

    const inAmount = getInAmount();

    if(inAmount.lt(10)) return;

    const gain = Decimal.floor(Decimal.log10(inAmount));

    if(gain.gt(infinityEnergy)){
        infinityEnergy = gain;
    }
}

function buyCreator(id){

    if(matter.gte(creators[id].cost)){

        matter = matter.minus(creators[id].cost);

        creators[id].amount = creators[id].amount.plus(1);
        creators[id].bought = creators[id].bought.plus(1);

        creators[id].cost = creators[id].cost.times(1.5);
    }
}

function buyMaxCreator(id){

    while(matter.gte(creators[id].cost)){

        matter = matter.minus(creators[id].cost);

        creators[id].amount = creators[id].amount.plus(1);
        creators[id].bought = creators[id].bought.plus(1);

        creators[id].cost = creators[id].cost.times(1.5);
    }
}

function buyGenerator(id){

    if(matter.gte(generators[id].cost)){

        matter = matter.minus(generators[id].cost);

        generators[id].amount = generators[id].amount.plus(1);
        generators[id].bought = generators[id].bought.plus(1);

        generators[id].cost = generators[id].cost.times(1.6);
    }
}

function buyMaxGenerator(id){

    while(matter.gte(generators[id].cost)){

        matter = matter.minus(generators[id].cost);

        generators[id].amount = generators[id].amount.plus(1);
        generators[id].bought = generators[id].bought.plus(1);

        generators[id].cost = generators[id].cost.times(1.6);
    }
}

function buyUpgrade(id){

    if(upgrades[id]) return;

    if(infinityEnergy.gte(upgradeCosts[id])){

        infinityEnergy = infinityEnergy.minus(upgradeCosts[id]);
        upgrades[id] = true;
    }
}

function creatorMultiplier(){

    let mult = new Decimal(1);

    if(upgrades[0]) mult = mult.times(2);
    if(upgrades[2]) mult = mult.times(10);

    if(upgrades[3]){
        mult = mult.times(Decimal.max(1, infinityEnergy.pow(2)));
    }

    return mult;
}

function costMultiplier(){

    let mult = new Decimal(1);
    if(upgrades[1]) mult = mult.times(0.5);
    return mult;
}

function gameTick(){

    const mult = creatorMultiplier();

    for(let i=CREATOR_COUNT-1;i>=1;i--){

        const production =
            creators[i].amount
            .times(mult)
            .times(0.1);

        creators[i-1].amount =
            creators[i-1].amount.plus(production);
    }

    const matterGain =
        creators[0].amount
        .times(mult)
        .times(0.1);

    matter = matter.plus(matterGain);

    gainInfinityEnergy();

    updateUI();
}

function updateUI(){

    document.getElementById("matter").innerText =
        "Matter: " + format(matter);

    document.getElementById("inDisplay").innerText =
        "In: " + format(getInAmount());

    document.getElementById("ieDisplay").innerText =
        "IE: " + infinityEnergy.toFixed(0);

    let html = "";

    for(let i=0;i<CREATOR_COUNT;i++){

        html += `
        <div class="creator">
            <b>Creator ${i+1}</b><br>
            Amount: ${format(creators[i].amount)}<br>
            Bought: ${creators[i].bought.toFixed(0)}<br>
            Cost: ${format(creators[i].cost.times(costMultiplier()))}<br>

            <button onclick="buyCreator(${i})">Buy 1</button>
            <button onclick="buyMaxCreator(${i})">Buy Max</button>
        </div>
        `;
    }

    document.getElementById("creators").innerHTML = html;

    let ghtml = "";

    for(let i=0;i<GENERATOR_COUNT;i++){

        ghtml += `
        <div class="creator">
            <b>Generator ${i+1}</b><br>
            Amount: ${format(generators[i].amount)}<br>
            Bought: ${generators[i].bought.toFixed(0)}<br>
            Cost: ${format(generators[i].cost)}<br>

            <button onclick="buyGenerator(${i})">Buy 1</button>
            <button onclick="buyMaxGenerator(${i})">Buy Max</button>
        </div>
        `;
    }

    document.getElementById("generators").innerHTML = ghtml;
}

setInterval(gameTick, 50);
updateUI();

</script>

</body>
</html>
