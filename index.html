<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Creator Dimensions Rebuild</title>

<script src="https://cdn.jsdelivr.net/npm/decimal.js@10.4.3/decimal.min.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:20px;
}

.panel{
    border:1px solid #444;
    padding:10px;
    margin-bottom:10px;
}

.item{
    border:1px solid #333;
    padding:8px;
    margin:5px 0;
}

button{
    background:#222;
    color:white;
    border:1px solid #666;
    padding:5px;
    cursor:pointer;
}

button:hover{
    background:#333;
}
</style>
</head>
<body>

<h1>Creator Dimensions</h1>

<div class="panel">
    <h2>Matter</h2>
    <div id="matter"></div>
    <div id="inDisplay"></div>
</div>

<div class="panel">
    <h2>Infinity Energy</h2>
    <div id="ieDisplay"></div>

    <button onclick="buyUpgrade(0)">Upgrade 1 (1 IE)</button>
    <button onclick="buyUpgrade(1)">Upgrade 2 (5 IE)</button>
    <button onclick="buyUpgrade(2)">Upgrade 3 (20 IE)</button>
    <button onclick="buyUpgrade(3)">Upgrade 4 (100 IE)</button>
</div>

<div class="panel">
    <h2>Creators</h2>
    <div id="creators"></div>
</div>

<div class="panel">
    <h2>Generators</h2>
    <div id="generators"></div>
</div>

<script>

const IN_BASE = new Decimal("1e308");

let matter = new Decimal(10);
let infinityEnergy = new Decimal(0);

const upgrades = [false,false,false,false];

const creators = {
    c1:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e1")},
    c2:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e2")},
    c3:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e3")},
    c4:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e4")},
    c5:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e5")},
    c6:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e6")},
    c7:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e7")},
    c8:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e8")},
    c9:  {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e9")},
    c10: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e10")},
    c11: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e15")},
    c12: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e20")},
    c13: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e25")},
    c14: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e35")},
    c15: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e50")}
};

const generators = {
    g1: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e1")},
    g2: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e2")},
    g3: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e4")},
    g4: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e6")},
    g5: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e10")},
    g6: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e15")},
    g7: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e25")},
    g8: {amount:new Decimal(0), bought:new Decimal(0), cost:new Decimal("1e40")}
};

function format(x){
    x = new Decimal(x);
    if(x.eq(0)) return "0";
    if(x.lt(IN_BASE)) return x.toExponential(3);
    return x.div(IN_BASE).toExponential(3) + " In";
}

function getInAmount(){
    return matter.div(IN_BASE);
}

function gainInfinityEnergy(){
    const inAmount = getInAmount();
    if(inAmount.lt(10)) return;

    const gain = Decimal.floor(Decimal.log10(inAmount));
    if(gain.gt(infinityEnergy)) infinityEnergy = gain;
}

function creatorMultiplier(){
    let m = new Decimal(1);
    if(upgrades[0]) m = m.times(2);
    if(upgrades[2]) m = m.times(10);
    if(upgrades[3]) m = m.times(Decimal.max(1,infinityEnergy.pow(2)));
    return m;
}

function costMultiplier(){
    return upgrades[1] ? new Decimal(0.5) : new Decimal(1);
}

/* BUY FUNCTIONS */
function buyCreator(c){
    if(matter.gte(c.cost)){
        matter = matter.minus(c.cost);
        c.amount = c.amount.plus(1);
        c.bought = c.bought.plus(1);
        c.cost = c.cost.times(1.35);
    }
}

function buyMaxCreator(c){
    while(matter.gte(c.cost)){
        matter = matter.minus(c.cost);
        c.amount = c.amount.plus(1);
        c.bought = c.bought.plus(1);
        c.cost = c.cost.times(1.35);
    }
}

function buyGenerator(g){
    if(matter.gte(g.cost)){
        matter = matter.minus(g.cost);
        g.amount = g.amount.plus(1);
        g.bought = g.bought.plus(1);
        g.cost = g.cost.times(1.4);
    }
}

function buyMaxGenerator(g){
    while(matter.gte(g.cost)){
        matter = matter.minus(g.cost);
        g.amount = g.amount.plus(1);
        g.bought = g.bought.plus(1);
        g.cost = g.cost.times(1.4);
    }
}

function buyUpgrade(i){
    const costs = [1,5,20,100];
    if(upgrades[i]) return;
    if(infinityEnergy.gte(costs[i])){
        infinityEnergy = infinityEnergy.minus(costs[i]);
        upgrades[i] = true;
    }
}

/* GAME LOOP */
function gameTick(){

    const m = creatorMultiplier();

    // generators -> creators
    creators.c15.amount = creators.c15.amount.plus(generators.g8.amount.times(m).times(0.01));
    creators.c14.amount = creators.c14.amount.plus(generators.g7.amount.times(m).times(0.01));
    creators.c13.amount = creators.c13.amount.plus(generators.g6.amount.times(m).times(0.01));
    creators.c12.amount = creators.c12.amount.plus(generators.g5.amount.times(m).times(0.01));
    creators.c11.amount = creators.c11.amount.plus(generators.g4.amount.times(m).times(0.01));
    creators.c10.amount = creators.c10.amount.plus(generators.g3.amount.times(m).times(0.01));
    creators.c9.amount  = creators.c9.amount.plus(generators.g2.amount.times(m).times(0.01));
    creators.c8.amount  = creators.c8.amount.plus(generators.g1.amount.times(m).times(0.01));

    // creators chain
    creators.c1.amount = creators.c1.amount.plus(creators.c2.amount.times(m).times(0.1));
    creators.c2.amount = creators.c2.amount.plus(creators.c3.amount.times(m).times(0.1));
    creators.c3.amount = creators.c3.amount.plus(creators.c4.amount.times(m).times(0.1));
    creators.c4.amount = creators.c4.amount.plus(creators.c5.amount.times(m).times(0.1));
    creators.c5.amount = creators.c5.amount.plus(creators.c6.amount.times(m).times(0.1));
    creators.c6.amount = creators.c6.amount.plus(creators.c7.amount.times(m).times(0.1));
    creators.c7.amount = creators.c7.amount.plus(creators.c8.amount.times(m).times(0.1));
    creators.c8.amount = creators.c8.amount.plus(creators.c9.amount.times(m).times(0.1));
    creators.c9.amount = creators.c9.amount.plus(creators.c10.amount.times(m).times(0.1));
    creators.c10.amount = creators.c10.amount.plus(creators.c11.amount.times(m).times(0.1));
    creators.c11.amount = creators.c11.amount.plus(creators.c12.amount.times(m).times(0.1));
    creators.c12.amount = creators.c12.amount.plus(creators.c13.amount.times(m).times(0.1));
    creators.c13.amount = creators.c13.amount.plus(creators.c14.amount.times(m).times(0.1));
    creators.c14.amount = creators.c14.amount.plus(creators.c15.amount.times(m).times(0.1));

    matter = matter.plus(creators.c1.amount.times(m).times(0.1));

    gainInfinityEnergy();
    updateUI();
}

/* UI */
function updateUI(){

    document.getElementById("matter").innerText =
        "Matter: " + format(matter);

    document.getElementById("inDisplay").innerText =
        "In: " + format(getInAmount());

    document.getElementById("ieDisplay").innerText =
        "IE: " + infinityEnergy.toFixed(0);

    let chtml = "";

    const cList = creators;

    const keysC = Object.keys(cList);

    for(let k of keysC){
        const c = cList[k];
        chtml += `
        <div class="item">
        <b>${k}</b><br>
        Amount: ${format(c.amount)}<br>
        Bought: ${c.bought.toFixed(0)}<br>
        Cost: ${format(c.cost.times(costMultiplier()))}<br>
        <button onclick="buyCreator(creators['${k}'])">Buy 1</button>
        <button onclick="buyMaxCreator(creators['${k}'])">Buy Max</button>
        </div>`;
    }

    document.getElementById("creators").innerHTML = chtml;

    let ghtml = "";

    const gList = generators;
    const keysG = Object.keys(gList);

    for(let k of keysG){
        const g = gList[k];
        ghtml += `
        <div class="item">
        <b>${k}</b><br>
        Amount: ${format(g.amount)}<br>
        Bought: ${g.bought.toFixed(0)}<br>
        Cost: ${format(g.cost)}<br>
        <button onclick="buyGenerator(generators['${k}'])">Buy 1</button>
        <button onclick="buyMaxGenerator(generators['${k}'])">Buy Max</button>
        </div>`;
    }

    document.getElementById("generators").innerHTML = ghtml;
}

setInterval(gameTick, 50);
updateUI();

</script>

</body>
</html>
